---
- name: "Backup Atómico y Push SMB: {{ product.filename }}"
  block:
    - name: "1. Preparar espejo limpio"
      win_file:
        path: "C:\\Windows\\Temp\\Mirror_Individual"
        state: "{{ item }}"
      loop: [absent, directory]

    - name: "2. Robocopy: Binarios sin Logs"
      win_shell: |
        robocopy "{{ product.path }}" "C:\\Windows\\Temp\\Mirror_Individual" /E /XF *.log /R:2 /W:5
      register: robo_res
      failed_when: robo_res.rc > 8

    - name: "3. Comprimir espejo"
      community.windows.win_zip:
        src: "C:\\Windows\\Temp\\Mirror_Individual\\"
        dest: "C:\\Windows\\Temp\\{{ product.filename }}.zip"

    - name: 4. Push Directo al Servidor de Respaldos (SMB)
      # El símbolo "|" es obligatorio para scripts de varias líneas
      win_shell: |
        $user = "docsol_backup"
        $pass = "kNFD8hDZxBuVkL3gdBJ3ZTh2"
        $remotePath = "\\172.17.120.37\respaldos\codigo\{{ inventory_hostname }}\{{ ansible_date_time.date }}"

        if (!(Test-Path $remotePath)) { 
            New-Item -ItemType Directory -Path $remotePath -Force 
        }

        $net = New-Object -ComObject WScript.Network
        # Limpieza de unidad Z: por si quedó mapeada de un intento previo
        if (Get-PSDrive Z -ErrorAction SilentlyContinue) {
            $net.RemoveNetworkDrive("Z:", $true)
        }

        $net.MapNetworkDrive("Z:", $remotePath, $false, $user, $pass)
        Copy-Item "C:\Windows\Temp\{{ product.filename }}.zip" "Z:\" -Force
        $net.RemoveNetworkDrive("Z:", $true)
      no_log: true 

    - name: "5. Limpieza de temporales"
      win_file:
        path: "{{ item }}"
        state: absent
      loop:
        - "C:\\Windows\\Temp\\Mirror_Individual"
        - "C:\\Windows\\Temp\\{{ product.filename }}.zip"