---
- name: "Backup Atómico: {{ product.filename }}"
  block:
    - name: "0. Asegurar directorios de trabajo"
      win_file:
        path: "{{ item }}"
        state: directory
      loop:
        - "C:\\DocSol_Automation"
        - "C:\\Windows\\Temp\\Backups"

    - name: "1. Preparar espejo limpio"
      win_file:
        path: "C:\\Windows\\Temp\\Mirror_{{ product.filename }}"
        state: "{{ item }}"
      loop: [absent, directory]

    - name: "2. Robocopy (Excluye logs)"
      win_shell: |
        robocopy "{{ product.path }}" "C:\\Windows\\Temp\\Mirror_Individual" /E /XF *.log /R:2 /W:5
      register: robo_res
      failed_when: robo_res.rc > 8

    - name: "3. Comprimir"
      community.windows.win_zip:
        src: "C:\\Windows\\Temp\\Mirror_Individual\\"
        dest: "C:\\Windows\\Temp\\{{ product.filename }}.zip"

    - name: "4. Enviar Script de Push al Windows"
      win_copy:
        src: push_backup.ps1
        dest: "C:\\DocSol_Automation\\push_backup.ps1"

    - name: "5. Crear Tarea Programada para el Push"
      community.windows.win_scheduled_task:
        name: "Ansible_Backup_Push"
        description: "Ejecuta el push de backup con privilegios elevados"
        actions:
          - path: "powershell.exe"
            arguments: >
              -NoProfile -ExecutionPolicy Bypass -File "C:\DocSol_Automation\push_backup.ps1"
              -inventory_hostname "{{ inventory_hostname }}"
              -date "{{ ansible_date_time.date }}"
              -filename "{{ product.filename }}"
        username: "SYSTEM"
        run_level: highest
        state: present
        enabled: yes

    - name: "5b. Disparar Tarea y esperar finalización"
      win_shell: |
        $taskName = "Ansible_Backup_Push"
        Start-ScheduledTask -TaskName $taskName
        # Esperar a que termine (mientras el estado sea 'Running')
        do { 
            Start-Sleep -Seconds 2
            $status = (Get-ScheduledTask -TaskName $taskName).State 
        } while ($status -eq "Running")
        
        # Opcional: Eliminar la tarea después de usarla para limpieza
        Unregister-ScheduledTask -TaskName $taskName -Confirm:$false

    - name: "6. Limpieza"
      win_file:
        path: "{{ item }}"
        state: absent
      loop:
        - "C:\\Windows\\Temp\\Mirror_Individual"
        - "C:\\Windows\\Temp\\{{ product.filename }}.zip"
        - "C:\\Windows\\Temp\\push_backup.ps1"