---
- name: Respaldo Dinámico de Aplicaciones (Sin Logs)
  hosts: Servidores_Apps
  gather_facts: yes
  vars:
    # Regex que dice: "Cualquier archivo que NO termine en .log, .txt, .tmp o .bak"
    regex_sin_logs: '^(?!.*(\.log|\.txt|\.tmp|\.bak)$).*$'
    central_backup_path: "/backups/Apps_Prod"
    temp_zip: "C:\\Windows\\Temp\\backup_limpio.zip"

  tasks:
    - name: 1. Forzar detección de unidades (Fallback)
      set_fact:
        active_drives: "{{ ansible_facts.mounts | map(attribute='mount') | list }}"

    - name: 2. Buscar archivos (Usando Regex Negativa)
      win_find:
        paths: "{{ active_drives }}"
        patterns: "{{ regex_sin_logs }}"
        use_regex: yes
        recurse: yes
        file_type: file
      register: app_files

    - name: 3. Comprimir lo encontrado
      community.windows.win_zip:
        dest: "{{ temp_zip }}"
        sources: "{{ item.path }}"
        action: add
      loop: "{{ app_files.files }}"
      when: app_files.matched > 0

    - name: 4. Transferir a la unidad de 100GB en dsb57
      fetch:
        src: "{{ temp_zip }}"
        dest: "{{ central_backup_path }}/{{ inventory_hostname }}/{{ ansible_date_time.date }}/backup_app.zip"
        flat: yes
      when: app_files.matched > 0

    - name: 5. Limpieza Final
      win_file:
        path: "{{ temp_zip }}"
        state: absent