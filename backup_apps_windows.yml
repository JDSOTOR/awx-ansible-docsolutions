---
- name: Respaldo Dinámico de Aplicaciones (Sin Logs)
  hosts: Servidores_Apps
  gather_facts: yes
  vars:
    exclude_extensions: ['*.log', '*.txt', '*.tmp', '*.bak', 'W3SVC*']
    central_backup_path: "/backups/Apps_Prod"
    temp_zip: "C:\\Windows\\Temp\\backup_limpio.zip"

  tasks:
    - name: 1. Inicializar lista de unidades
      set_fact:
        active_drives: []

    - name: 2. Construir lista de unidades detectadas
      set_fact:
        active_drives: "{{ active_drives + [ item.drive_letter + ':\\' ] }}"
      loop: "{{ ansible_facts.mounts }}"
      when: item.drive_letter is defined and item.drive_letter != ""

    - name: 3. Buscar archivos (Excluyendo Logs)
      win_find:
        paths: "{{ active_drives }}"
        patterns: "*"
        excludes: "{{ exclude_extensions }}"
        recurse: yes
        file_type: file
      register: app_files

    - name: 4. Comprimir lo encontrado
      community.windows.win_zip:
        dest: "{{ temp_zip }}"
        sources: "{{ item.path }}"
        action: add
      loop: "{{ app_files.files }}"
      when: app_files.matched > 0

    - name: 5. Transferir a la unidad de 100GB en dsb57
      fetch:
        src: "{{ temp_zip }}"
        dest: "{{ central_backup_path }}/{{ inventory_hostname }}/{{ ansible_date_time.date }}/backup_app.zip"
        flat: yes
      when: app_files.matched > 0

    - name: 6. Limpiar temporal
      win_file:
        path: "{{ temp_zip }}"
        state: absent