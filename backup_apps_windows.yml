---
- name: Respaldo Dinámico Multiserver (DocSolutions)
  hosts: Servidores_Apps
  gather_facts: yes
  vars:
    # Esta Regex busca archivos que:
    # 1. NO estén en Windows, Program Files, Users, etc. (?!.*(Windows|Program Files|...))
    # 2. NO terminen en .log, .txt, .tmp, .bak (\.(log|txt|tmp|bak)$)$
    regex_maestra: '^(?!.*(Windows|Program Files|Program Files \(x86\)|Users|Recycle\.Bin|System Volume Information|ProgramData|PerfLogs)).*(?<!\.(log|txt|tmp|bak))$'
    
    central_backup_path: "/backups/Apps_Prod"
    temp_zip: "C:\\Windows\\Temp\\backup_apps.zip"

  tasks:
    - name: 1. Obtener letras de unidad vía PowerShell
      win_shell: |
        Get-PSDrive -PSProvider FileSystem | Select-Object -ExpandProperty Root
      register: drive_out

    - name: 2. Normalizar lista de unidades
      set_fact:
        active_drives: "{{ drive_out.stdout_lines | map('trim') | list }}"

    - name: 3. Buscar archivos de aplicación (Filtrado por Regex)
      win_find:
        paths: "{{ active_drives }}"
        patterns: "{{ regex_maestra }}"
        use_regex: yes
        recurse: yes
        file_type: file
      register: app_files

    - name: 4. Comprimir hallazgos
      community.windows.win_zip:
        dest: "{{ temp_zip }}"
        sources: "{{ item.path }}"
        action: add
      loop: "{{ app_files.files }}"
      when: app_files.matched > 0
      no_log: true

    - name: 5. Transferir a dsb57 (Estructura Dinámica)
      fetch:
        src: "{{ temp_zip }}"
        dest: "{{ central_backup_path }}/{{ inventory_hostname }}/{{ ansible_date_time.date }}/backup_docsolutions.zip"
        flat: yes
      when: app_files.matched > 0

    - name: 6. Limpieza de residuos en Windows
      win_file:
        path: "{{ temp_zip }}"
        state: absent