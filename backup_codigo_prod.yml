---
- name: Respaldo Multi-Ruta Dinámico - DocSolutions
  hosts: "{{ target_hosts | default('all') }}"  # Permite filtrar desde AWX
  gather_facts: yes
  vars:
    # Estas son las rutas por defecto si el host no tiene unas específicas
    default_rutas:
      - "C:\\APPS_PROD"
      - "D:\\APPS_PROD"
      - "E:\\"
    temp_zip_dir: "C:\\Windows\\Temp\\Backups"

  tasks:
    - name: 1. Determinar rutas a respaldar
      # Si el host tiene definida su propia lista 'mis_rutas', la usa; si no, usa la default
      set_fact:
        rutas_finales: "{{ mis_rutas | default(default_rutas) }}"

    - name: 2. Buscar carpetas en todas las rutas
      win_find:
        paths: "{{ item }}"
        file_type: directory
      register: find_results
      loop: "{{ rutas_finales }}"

    - name: 3. Consolidar lista de productos
      set_fact:
        lista_productos: "{{ find_results.results | map(attribute='files') | flatten }}"

    - name: 4. Ejecutar respaldo atómico
      include_tasks: inner_backup_seguro.yml
      loop: "{{ lista_productos }}"
      loop_control:
        loop_var: product