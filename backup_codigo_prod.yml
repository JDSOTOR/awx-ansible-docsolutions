---
- name: Respaldo de Código Estandarizado - DocSolutions
  hosts: 172.17.120.10
  gather_facts: yes
  vars:
    path_apps_prod: "C:\\APPS_PROD"
    temp_mirror: "C:\\Windows\\Temp\\Mirror_Apps"
    temp_zip_code: "C:\\Windows\\Temp\\codigo_produccion.zip"
    base_nfs: "/mnt/respaldos_externos"
    dest_codigo: "{{ base_nfs }}/codigo/{{ inventory_hostname }}/{{ ansible_date_time.date }}"

  tasks:
    - name: 1. Asegurar limpieza y creación de carpeta temporal
      win_file:
        path: "{{ temp_mirror }}"
        state: "{{ item }}"
      loop:
        - absent
        - directory

    - name: 2. Crear espejo con Robocopy (Excluyendo .log)
      win_shell: |
        robocopy "{{ path_apps_prod }}" "{{ temp_mirror }}" /E /XF *.log /R:2 /W:5
      register: robocopy_status
      # Robocopy usa códigos de salida (exit codes) del 0 al 8 como "éxito".
      # Ansible cree que cualquier cosa arriba de 0 es error, así que lo corregimos:
      failed_when: robocopy_status.rc > 8

    - name: 3. Comprimir el espejo (Solo src y dest)
      community.windows.win_zip:
        src: "{{ temp_mirror }}\\"
        dest: "{{ temp_zip_code }}"
        
    - name: 3.5 Preparar directorio local en el servidor AWX
      file:
        path: "{{ dest_codigo }}"
        state: directory
        mode: '0777'
      delegate_to: localhost

    - name: 4. Transferir Código al NFS
      fetch:
        src: "{{ temp_zip_code }}"
        dest: "{{ dest_codigo }}/codigo_apps.zip"
        flat: yes

    - name: 5. Limpieza final
      win_file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ temp_mirror }}"
        - "{{ temp_zip_code }}"