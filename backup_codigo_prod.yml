---
- name: Respaldo Multi-Ruta Dinámico (Limpio y Resiliente) - DocSolutions
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: yes
  vars:
    default_rutas:
      - "C:\\APPS_PROD"
      - "D:\\APPS_PROD"
      - "E:\\"
      - "F:\\APPS_PROD"
    # Nueva ruta estándar para evitar bloqueos en Temp
    scripts_dir: "C:\\DocSol_Automation"
    temp_zip_dir: "C:\\Windows\\Temp\\Backups"

  tasks:
    - name: 1. Determinar rutas a respaldar
      set_fact:
        rutas_finales: "{{ mis_rutas | default(default_rutas) }}"

    - name: 2. Validar existencia de rutas físicas
      win_stat:
        path: "{{ item }}"
      register: validacion_rutas
      loop: "{{ rutas_finales }}"

    - name: 3. Reportar rutas no encontradas (Informativo)
      debug:
        msg: "AVISO: La ruta {{ item.item }} no existe en este host. Se omitirá."
      loop: "{{ validacion_rutas.results }}"
      when: not item.stat.exists

    - name: 4. Buscar carpetas de productos en rutas válidas
      win_find:
        paths: "{{ item.item }}"
        file_type: directory
        recurse: no
      register: find_results
      loop: "{{ validacion_rutas.results }}"
      when: item.stat.exists
      # Ya no necesitamos ignore_errors porque validamos antes con win_stat

    - name: 5. Consolidar lista maestra de productos
      set_fact:
        lista_productos: "{{ find_results.results | selectattr('files', 'defined') | map(attribute='files') | flatten }}"

    - name: 6. Preparar entorno de ejecución estándar
      win_file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ scripts_dir }}"
        - "{{ temp_zip_dir }}"

    - name: 7. Ejecutar respaldo atómico
      include_tasks: inner_backup_seguro.yml
      loop: "{{ lista_productos }}"
      loop_control:
        loop_var: product
      when: lista_productos | length > 0