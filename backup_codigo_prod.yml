---
- name: Respaldo Multi-Ruta Dinámico (Resiliente) - DocSolutions
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: yes
  vars:
    default_rutas:
      - "C:\\APPS_PROD"
      - "D:\\APPS_PROD"
      - "E:\\"
      - "F:\\APPS_PROD"
    temp_zip_dir: "C:\\Windows\\Temp\\Backups"

  tasks:
    - name: 1. Determinar rutas a respaldar
      set_fact:
        rutas_finales: "{{ mis_rutas | default(default_rutas) }}"

    - name: 2. Buscar carpetas en todas las rutas definidas
      win_find:
        paths: "{{ item }}"
        file_type: directory
        recurse: no
      register: find_results
      loop: "{{ rutas_finales }}"
      # Evita que el job falle si una unidad (D:, E:, etc.) no está montada
      ignore_errors: yes

    - name: 3. Consolidar lista de productos (Filtrado de rutas válidas)
      set_fact:
        # Filtramos solo los resultados que tienen el atributo 'files' (los que no fallaron)
        lista_productos: "{{ find_results.results | selectattr('files', 'defined') | map(attribute='files') | flatten }}"

    - name: 4. Validar si se encontraron productos
      debug:
        msg: "Se encontraron {{ lista_productos | length }} carpetas para respaldar."

    - name: 5. Ejecutar respaldo atómico
      include_tasks: inner_backup_seguro.yml
      loop: "{{ lista_productos }}"
      loop_control:
        loop_var: product
      # Solo ejecutamos si la lista no está vacía para evitar errores de loop
      when: lista_productos | length > 0