---
- name: Respaldo de Código Estandarizado (Push SMB) - DocSolutions
  hosts: 172.17.120.10
  gather_facts: yes
  vars:
    path_apps_prod: "C:\\APPS_PROD"
    temp_zip_dir: "C:\\Windows\\Temp\\Backups"
    # Datos del servidor de respaldos (DSA57)
    smb_server: "172.17.119.37"
    smb_share: "respaldos"

  tasks:
    - name: 1. Listar carpetas de productos en APPS_PROD
      win_find:
        paths: "{{ path_apps_prod }}"
        file_type: directory
      register: product_dirs

    - name: 2. Asegurar que la carpeta de ZIPS temporales esté lista en Windows
      win_file:
        path: "{{ temp_zip_dir }}"
        state: "{{ item }}"
      loop: [absent, directory]

    - name: 3. Ejecutar respaldo atómico por cada producto
      # Aquí llamamos al archivo que configuramos anteriormente
      include_tasks: inner_backup_seguro.yml
      loop: "{{ product_dirs.files }}"
      loop_control:
        loop_var: product

    - name: 4. Limpieza final del directorio de ZIPS
      win_file:
        path: "{{ temp_zip_dir }}"
        state: absent